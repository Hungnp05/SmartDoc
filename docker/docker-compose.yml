version: "3.9"

services:
  # ── Ollama (AI Model Server) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: smartdoc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    # GPU support — remove if running CPU-only
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Model Puller (runs once on startup) ────────────────────────────────────
  ollama-setup:
    image: curlimages/curl:latest
    container_name: smartdoc-setup
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "
        echo 'Pulling Llama3:8b...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3:8b\"}' &&
        echo 'Pulling LLaVA:7b...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llava:7b\"}' &&
        echo 'Pulling nomic-embed-text...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' &&
        echo 'All models ready!'
      "

  # ── SmartDoc-Insight App ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: smartdoc-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data                  # Persist ChromaDB + uploads
      - ./src:/app/src                    # Live reload for dev
      - ./app:/app/app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3:8b
      - VISION_MODEL=llava:7b
      - EMBED_MODEL=nomic-embed-text
      - CHROMA_DIR=/app/data/chroma_db
      - PDF_DPI=200
      - RETRIEVAL_TOP_K=10
      - RERANK_TOP_K=4
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
    name: smartdoc_ollama_models
